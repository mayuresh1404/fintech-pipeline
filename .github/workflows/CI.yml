name: Fintech CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: trade-api

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Market Hours Gate
  # ─────────────────────────────────────────
  market-hours-check:
    name: 🕐 Market Hours Gate
    runs-on: ubuntu-latest

    steps:
      - name: Check if market is open
        run: |
          set -e

          # Get IST time
          IST_TIME=$(TZ="Asia/Kolkata" date +"%H:%M")
          IST_HOUR=$(TZ="Asia/Kolkata" date +%H)
          IST_MIN=$(TZ="Asia/Kolkata" date +%M)
          IST_DAY=$(TZ="Asia/Kolkata" date +%u)

          TOTAL_MINS=$((IST_HOUR * 60 + IST_MIN))

          # Market timing (9:15 AM – 3:30 PM)
          MARKET_OPEN=$((9 * 60 + 15))
          MARKET_CLOSE=$((15 * 60 + 30))

          echo "🕐 Current IST Time: $IST_TIME"
          echo "📅 Day of week: $IST_DAY (1=Mon ... 7=Sun)"
          echo "🧮 Total Minutes Today: $TOTAL_MINS"

          # Block deployment if weekday AND during market hours
          if [ "$IST_DAY" -le 5 ] && \
             [ "$TOTAL_MINS" -ge "$MARKET_OPEN" ] && \
             [ "$TOTAL_MINS" -le "$MARKET_CLOSE" ]; then
            echo "❌ DEPLOYMENT BLOCKED!"
            echo "Market is OPEN ($IST_TIME IST)"
            echo "Deployments not allowed between 9:15 AM – 3:30 PM IST"
            exit 1
          else
            echo "✅ Market CLOSED — Deployment Allowed"
          fi


  # ─────────────────────────────────────────
  # JOB 2: Build & Push to ECR
  # ─────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push to ECR
    runs-on: ubuntu-latest
    needs: market-hours-check

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Set image tag
        run: echo "IMAGE_TAG=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build -t \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} .

      - name: Push Docker image
        run: |
          docker push \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

      - name: Tag and push latest
        run: |
          docker tag \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest

          docker push \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest

          echo "✅ Image pushed successfully!"